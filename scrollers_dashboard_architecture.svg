<svg viewBox="0 0 1200 920" xmlns="http://www.w3.org/2000/svg" style="background: #020617;">
  <!-- Grid background -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
    
    <!-- Arrow markers -->
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b" />
    </marker>
    <marker id="arrowhead-cyan" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22d3ee" />
    </marker>
    <marker id="arrowhead-emerald" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#34d399" />
    </marker>
    <marker id="arrowhead-rose" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#fb7185" />
    </marker>
    
    <style>
      text {
        font-family: 'JetBrains Mono', 'Courier New', monospace;
      }
    </style>
  </defs>

  <rect width="1200" height="920" fill="url(#grid)"/>

  <!-- Title -->
  <text x="600" y="25" fill="#f1f5f9" font-size="18" font-weight="700" text-anchor="middle">Scroller's Dashboard Architecture</text>

  <!-- Layer Labels -->
  <text x="30" y="100" fill="#475569" font-size="10" font-weight="600" transform="rotate(-90 30 100)">USER CONTEXT</text>
  <text x="30" y="270" fill="#475569" font-size="10" font-weight="600" transform="rotate(-90 30 270)">BACKGROUND ENGINE</text>
  <text x="30" y="480" fill="#475569" font-size="10" font-weight="600" transform="rotate(-90 30 480)">DATA LAYER</text>
  <text x="30" y="680" fill="#475569" font-size="10" font-weight="600" transform="rotate(-90 30 680)">PRESENTATION</text>

  <!-- USER JOURNEY FLOW ANNOTATIONS -->
  <text x="600" y="55" fill="#22d3ee" font-size="11" font-weight="600" text-anchor="middle">STEP 1: User Scrolls Reel</text>
  <line x1="100" y1="70" x2="550" y2="70" stroke="#22d3ee" stroke-width="2" marker-end="url(#arrowhead-cyan)" stroke-dasharray="4,4"/>

  <!-- LAYER 1: User Apps (External) -->
  <rect x="80" y="90" width="200" height="80" rx="6" fill="#0f172a"/>
  <rect x="80" y="90" width="200" height="80" rx="6" fill="rgba(30, 41, 59, 0.5)" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="180" y="120" fill="white" font-size="12" font-weight="600" text-anchor="middle">Instagram / YouTube</text>
  <text x="180" y="138" fill="#94a3b8" font-size="9" text-anchor="middle">Reels • Shorts • Stories</text>
  <text x="180" y="155" fill="#64748b" font-size="8" text-anchor="middle">(TYPE_WINDOW_STATE_CHANGED)</text>

  <rect x="320" y="90" width="200" height="80" rx="6" fill="#0f172a"/>
  <rect x="320" y="90" width="200" height="80" rx="6" fill="rgba(30, 41, 59, 0.5)" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="420" y="120" fill="white" font-size="12" font-weight="600" text-anchor="middle">UsageStatsManager</text>
  <text x="420" y="138" fill="#94a3b8" font-size="9" text-anchor="middle">Android System API</text>
  <text x="420" y="155" fill="#64748b" font-size="8" text-anchor="middle">(30s sync interval)</text>

  <!-- Connection: User Apps -> Accessibility Service -->
  <line x1="180" y1="170" x2="280" y2="220" stroke="#22d3ee" stroke-width="2" marker-end="url(#arrowhead-cyan)"/>
  <text x="210" y="190" fill="#22d3ee" font-size="8">scroll event</text>

  <line x1="420" y1="170" x2="380" y2="220" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <text x="400" y="190" fill="#64748b" font-size="8">screen time</text>

  <!-- LAYER 2: Background Engine -->
  <text x="600" y="235" fill="#34d399" font-size="11" font-weight="600" text-anchor="middle">STEP 2: Service Tracks &amp; Batches</text>

  <!-- Main Accessibility Service -->
  <rect x="150" y="250" width="300" height="120" rx="8" fill="#0f172a"/>
  <rect x="150" y="250" width="300" height="120" rx="8" fill="rgba(6, 78, 59, 0.4)" stroke="#34d399" stroke-width="2"/>
  <text x="300" y="278" fill="white" font-size="13" font-weight="700" text-anchor="middle">ScrollerAccessibilityService</text>
  <text x="300" y="296" fill="#34d399" font-size="9" text-anchor="middle">THE BRAIN</text>
  
  <!-- Internal modules -->
  <rect x="170" y="310" width="120" height="45" rx="4" fill="rgba(6, 78, 59, 0.2)" stroke="#34d399" stroke-width="1"/>
  <text x="230" y="328" fill="#34d399" font-size="9" font-weight="600" text-anchor="middle">InstagramTracker</text>
  <text x="230" y="342" fill="#94a3b8" font-size="7" text-anchor="middle">RecyclerView</text>
  
  <rect x="310" y="310" width="120" height="45" rx="4" fill="rgba(6, 78, 59, 0.2)" stroke="#34d399" stroke-width="1"/>
  <text x="370" y="328" fill="#34d399" font-size="9" font-weight="600" text-anchor="middle">YouTubeTracker</text>
  <text x="370" y="342" fill="#94a3b8" font-size="7" text-anchor="middle">ViewPager</text>

  <!-- Batching Logic -->
  <rect x="480" y="260" width="160" height="80" rx="6" fill="#0f172a"/>
  <rect x="480" y="260" width="160" height="80" rx="6" fill="rgba(6, 78, 59, 0.3)" stroke="#34d399" stroke-width="1.5"/>
  <text x="560" y="288" fill="white" font-size="11" font-weight="600" text-anchor="middle">Batching Engine</text>
  <text x="560" y="305" fill="#94a3b8" font-size="8" text-anchor="middle">Every 3 scrolls</text>
  <text x="560" y="320" fill="#94a3b8" font-size="8" text-anchor="middle">Battery optimization</text>
  <text x="560" y="335" fill="#64748b" font-size="7" text-anchor="middle">Local buffer → DB write</text>

  <line x1="450" y1="310" x2="480" y2="300" stroke="#34d399" stroke-width="1.5" marker-end="url(#arrowhead-emerald)"/>

  <!-- Intervention Logic -->
  <rect x="680" y="260" width="180" height="80" rx="6" fill="#0f172a"/>
  <rect x="680" y="260" width="180" height="80" rx="6" fill="rgba(136, 19, 55, 0.4)" stroke="#fb7185" stroke-width="1.5"/>
  <text x="770" y="288" fill="white" font-size="11" font-weight="600" text-anchor="middle">Limit Checker</text>
  <text x="770" y="305" fill="#fb7185" font-size="8" text-anchor="middle">Daily limit monitoring</text>
  <text x="770" y="320" fill="#fb7185" font-size="8" text-anchor="middle">Alert frequency gap</text>
  <text x="770" y="335" fill="#64748b" font-size="7" text-anchor="middle">Triggers overlay system</text>

  <!-- Connection to Database -->
  <text x="600" y="405" fill="#a78bfa" font-size="11" font-weight="600" text-anchor="middle">STEP 3: Data Persisted</text>
  
  <line x1="300" y1="370" x2="300" y2="440" stroke="#a78bfa" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="310" y="405" fill="#a78bfa" font-size="8">write batch</text>
  
  <line x1="560" y1="340" x2="400" y2="440" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <text x="480" y="395" fill="#a78bfa" font-size="8">scroll events</text>

  <!-- LAYER 3: Database (Room) -->
  <rect x="120" y="460" width="560" height="140" rx="8" fill="#0f172a"/>
  <rect x="120" y="460" width="560" height="140" rx="8" fill="rgba(76, 29, 149, 0.4)" stroke="#a78bfa" stroke-width="2"/>
  <text x="400" y="488" fill="white" font-size="13" font-weight="700" text-anchor="middle">Room Database (ScrollData.kt)</text>
  <text x="400" y="506" fill="#a78bfa" font-size="9" text-anchor="middle">SOURCE OF TRUTH</text>

  <!-- Database Tables -->
  <rect x="140" y="525" width="120" height="60" rx="4" fill="rgba(76, 29, 149, 0.2)" stroke="#a78bfa" stroke-width="1"/>
  <text x="200" y="543" fill="#a78bfa" font-size="9" font-weight="600" text-anchor="middle">ScrollRecords</text>
  <text x="200" y="558" fill="#94a3b8" font-size="7" text-anchor="middle">Daily totals</text>
  <text x="200" y="570" fill="#94a3b8" font-size="7" text-anchor="middle">IG + YT counts</text>

  <rect x="280" y="525" width="120" height="60" rx="4" fill="rgba(76, 29, 149, 0.2)" stroke="#a78bfa" stroke-width="1"/>
  <text x="340" y="543" fill="#a78bfa" font-size="9" font-weight="600" text-anchor="middle">ScrollEvents</text>
  <text x="340" y="558" fill="#94a3b8" font-size="7" text-anchor="middle">Timestamps</text>
  <text x="340" y="570" fill="#94a3b8" font-size="7" text-anchor="middle">Peak hours data</text>

  <rect x="420" y="525" width="120" height="60" rx="4" fill="rgba(76, 29, 149, 0.2)" stroke="#a78bfa" stroke-width="1"/>
  <text x="480" y="543" fill="#a78bfa" font-size="9" font-weight="600" text-anchor="middle">UserSettings</text>
  <text x="480" y="558" fill="#94a3b8" font-size="7" text-anchor="middle">Limits &amp; alerts</text>
  <text x="480" y="570" fill="#94a3b8" font-size="7" text-anchor="middle">Strict mode toggle</text>

  <rect x="560" y="525" width="105" height="60" rx="4" fill="rgba(76, 29, 149, 0.2)" stroke="#a78bfa" stroke-width="1"/>
  <text x="612" y="543" fill="#a78bfa" font-size="9" font-weight="600" text-anchor="middle">Tasks</text>
  <text x="612" y="558" fill="#94a3b8" font-size="7" text-anchor="middle">To-Do items</text>
  <text x="612" y="570" fill="#94a3b8" font-size="7" text-anchor="middle">Goals sync</text>

  <!-- Kotlin Flow Observer -->
  <rect x="730" y="480" width="140" height="100" rx="6" fill="rgba(251, 146, 60, 0.3)" stroke="#fb923c" stroke-width="1.5"/>
  <text x="800" y="508" fill="#fb923c" font-size="10" font-weight="600" text-anchor="middle">Kotlin Flow</text>
  <text x="800" y="525" fill="#fb923c" font-size="8" text-anchor="middle">Real-time Observer</text>
  <text x="800" y="545" fill="#94a3b8" font-size="7" text-anchor="middle">DB changes →</text>
  <text x="800" y="560" fill="#94a3b8" font-size="7" text-anchor="middle">UI updates</text>
  <text x="800" y="575" fill="#64748b" font-size="7" text-anchor="middle">collectAsState()</text>

  <line x1="680" y1="530" x2="730" y2="530" stroke="#fb923c" stroke-width="1.5" marker-end="url(#arrowhead)" stroke-dasharray="3,3"/>

  <!-- Connection to UI -->
  <text x="600" y="635" fill="#22d3ee" font-size="11" font-weight="600" text-anchor="middle">STEP 4: UI Reacts in Real-time</text>
  
  <line x1="200" y1="600" x2="180" y2="670" stroke="#22d3ee" stroke-width="2" marker-end="url(#arrowhead-cyan)"/>
  <text x="160" y="635" fill="#22d3ee" font-size="8">rings data</text>
  
  <line x1="340" y1="600" x2="340" y2="670" stroke="#22d3ee" stroke-width="2" marker-end="url(#arrowhead-cyan)"/>
  <text x="350" y="635" fill="#22d3ee" font-size="8">activity graphs</text>
  
  <line x1="480" y1="600" x2="500" y2="670" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arrowhead-cyan)"/>
  <text x="490" y="635" fill="#22d3ee" font-size="8">settings</text>
  
  <line x1="612" y1="600" x2="650" y2="670" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arrowhead-cyan)"/>
  <text x="632" y="635" fill="#22d3ee" font-size="8">goals</text>

  <line x1="800" y1="580" x2="800" y2="670" stroke="#fb923c" stroke-width="2" marker-end="url(#arrowhead)" stroke-dasharray="3,3"/>

  <!-- LAYER 4: UI (Jetpack Compose) -->
  <rect x="80" y="690" width="160" height="100" rx="6" fill="#0f172a"/>
  <rect x="80" y="690" width="160" height="100" rx="6" fill="rgba(8, 51, 68, 0.4)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="160" y="718" fill="white" font-size="11" font-weight="600" text-anchor="middle">Dashboard</text>
  <text x="160" y="735" fill="#94a3b8" font-size="8" text-anchor="middle">MainActivity.kt</text>
  <text x="160" y="755" fill="#22d3ee" font-size="7" text-anchor="middle">• Rings (limits)</text>
  <text x="160" y="770" fill="#22d3ee" font-size="7" text-anchor="middle">• Trend analysis</text>
  <text x="160" y="785" fill="#64748b" font-size="7" text-anchor="middle">animateFloatAsState</text>

  <rect x="260" y="690" width="160" height="100" rx="6" fill="#0f172a"/>
  <rect x="260" y="690" width="160" height="100" rx="6" fill="rgba(8, 51, 68, 0.4)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="340" y="718" fill="white" font-size="11" font-weight="600" text-anchor="middle">Activity Analysis</text>
  <text x="340" y="735" fill="#94a3b8" font-size="8" text-anchor="middle">ActivityScreen.kt</text>
  <text x="340" y="755" fill="#22d3ee" font-size="7" text-anchor="middle">• Day view (24 bins)</text>
  <text x="340" y="770" fill="#22d3ee" font-size="7" text-anchor="middle">• Month view</text>
  <text x="340" y="785" fill="#64748b" font-size="7" text-anchor="middle">Peak hours graph</text>

  <rect x="440" y="690" width="160" height="100" rx="6" fill="#0f172a"/>
  <rect x="440" y="690" width="160" height="100" rx="6" fill="rgba(8, 51, 68, 0.4)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="520" y="718" fill="white" font-size="11" font-weight="600" text-anchor="middle">Settings</text>
  <text x="520" y="735" fill="#94a3b8" font-size="8" text-anchor="middle">SettingsScreen.kt</text>
  <text x="520" y="755" fill="#22d3ee" font-size="7" text-anchor="middle">• Limit configuration</text>
  <text x="520" y="770" fill="#22d3ee" font-size="7" text-anchor="middle">• Alert frequency</text>
  <text x="520" y="785" fill="#64748b" font-size="7" text-anchor="middle">KeyboardActions save</text>

  <rect x="620" y="690" width="160" height="100" rx="6" fill="#0f172a"/>
  <rect x="620" y="690" width="160" height="100" rx="6" fill="rgba(8, 51, 68, 0.4)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="700" y="718" fill="white" font-size="11" font-weight="600" text-anchor="middle">Goals Page</text>
  <text x="700" y="735" fill="#94a3b8" font-size="8" text-anchor="middle">GoalsScreen</text>
  <text x="700" y="755" fill="#22d3ee" font-size="7" text-anchor="middle">• Daily tasks</text>
  <text x="700" y="770" fill="#22d3ee" font-size="7" text-anchor="middle">• Permanent tasks</text>
  <text x="700" y="785" fill="#64748b" font-size="7" text-anchor="middle">refresh_daily_todo</text>

  <!-- Firebase Analytics -->
  <rect x="920" y="690" width="180" height="100" rx="6" fill="#0f172a"/>
  <rect x="920" y="690" width="180" height="100" rx="6" fill="rgba(120, 53, 15, 0.3)" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="1010" y="718" fill="white" font-size="11" font-weight="600" text-anchor="middle">Firebase Analytics</text>
  <text x="1010" y="735" fill="#94a3b8" font-size="8" text-anchor="middle">External Cloud</text>
  <text x="1010" y="755" fill="#fbbf24" font-size="7" text-anchor="middle">• first_open</text>
  <text x="1010" y="770" fill="#fbbf24" font-size="7" text-anchor="middle">• app_open</text>
  <text x="1010" y="785" fill="#64748b" font-size="7" text-anchor="middle">Active user tracking</text>

  <line x1="780" y1="740" x2="920" y2="740" stroke="#fbbf24" stroke-width="1" marker-end="url(#arrowhead)" stroke-dasharray="3,3"/>
  <text x="850" y="730" fill="#fbbf24" font-size="7">events</text>

  <!-- INTERVENTION FLOW (Right side) -->
  <text x="970" y="235" fill="#fb7185" font-size="11" font-weight="600" text-anchor="middle">STEP 5: Limit Reached → Intervention</text>
  
  <!-- WindowManager Overlay -->
  <rect x="900" y="260" width="220" height="140" rx="8" fill="#0f172a"/>
  <rect x="900" y="260" width="220" height="140" rx="8" fill="rgba(136, 19, 55, 0.4)" stroke="#fb7185" stroke-width="2"/>
  <text x="1010" y="288" fill="white" font-size="12" font-weight="700" text-anchor="middle">WindowManager Overlay</text>
  <text x="1010" y="306" fill="#fb7185" font-size="9" text-anchor="middle">THE INTERVENTION</text>
  
  <rect x="920" y="320" width="180" height="65" rx="4" fill="rgba(136, 19, 55, 0.2)" stroke="#fb7185" stroke-width="1"/>
  <text x="1010" y="338" fill="#fb7185" font-size="9" font-weight="600" text-anchor="middle">Alert Screen</text>
  <text x="1010" y="353" fill="#94a3b8" font-size="7" text-anchor="middle">layout_alert_screen.xml</text>
  <text x="1010" y="368" fill="#94a3b8" font-size="7" text-anchor="middle">Displays goals &amp; tasks</text>
  <text x="1010" y="382" fill="#64748b" font-size="7" text-anchor="middle">GLOBAL_ACTION_HOME</text>

  <!-- Connection from Limit Checker to Overlay -->
  <line x1="860" y1="300" x2="900" y2="300" stroke="#fb7185" stroke-width="2" marker-end="url(#arrowhead-rose)"/>
  <text x="880" y="290" fill="#fb7185" font-size="8">trigger</text>

  <!-- Tasks sync from Overlay to Database -->
  <line x1="1010" y1="400" x2="750" y2="530" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arrowhead)" stroke-dasharray="4,4"/>
  <text x="900" y="470" fill="#a78bfa" font-size="8">add task</text>

  <!-- Overlay blocks user apps -->
  <line x1="1000" y1="260" x2="520" y2="170" stroke="#fb7185" stroke-width="1.5" stroke-dasharray="4,4"/>
  <text x="760" y="210" fill="#fb7185" font-size="8">blocks screen</text>

  <!-- Legend -->
  <text x="100" y="850" fill="#94a3b8" font-size="10" font-weight="600">Component Types:</text>
  
  <rect x="100" y="865" width="15" height="15" rx="2" fill="rgba(8, 51, 68, 0.4)" stroke="#22d3ee" stroke-width="1"/>
  <text x="125" y="877" fill="#cbd5e1" font-size="9">Frontend (Compose UI)</text>

  <rect x="280" y="865" width="15" height="15" rx="2" fill="rgba(6, 78, 59, 0.4)" stroke="#34d399" stroke-width="1"/>
  <text x="305" y="877" fill="#cbd5e1" font-size="9">Background Service</text>

  <rect x="460" y="865" width="15" height="15" rx="2" fill="rgba(76, 29, 149, 0.4)" stroke="#a78bfa" stroke-width="1"/>
  <text x="485" y="877" fill="#cbd5e1" font-size="9">Database (Room)</text>

  <rect x="640" y="865" width="15" height="15" rx="2" fill="rgba(136, 19, 55, 0.4)" stroke="#fb7185" stroke-width="1"/>
  <text x="665" y="877" fill="#cbd5e1" font-size="9">Security/Intervention</text>

  <rect x="820" y="865" width="15" height="15" rx="2" fill="rgba(120, 53, 15, 0.3)" stroke="#fbbf24" stroke-width="1"/>
  <text x="845" y="877" fill="#cbd5e1" font-size="9">External (Cloud)</text>

  <rect x="1000" y="865" width="15" height="15" rx="2" fill="rgba(251, 146, 60, 0.3)" stroke="#fb923c" stroke-width="1"/>
  <text x="1025" y="877" fill="#cbd5e1" font-size="9">Message Bus/Observer</text>
</svg>